<main class="min-h-screen bg-slate-100 px-4 py-6">
  <section
    class="mx-auto w-full max-w-2xl rounded-xl border border-slate-200 bg-white p-5 shadow-sm"
  >
    <div class="flex items-center justify-between gap-2">
      <p class="font-['Space_Grotesk'] text-xl font-semibold text-slate-900">Settings</p>
      <button
        type="button"
        class="rounded-lg border border-slate-300 px-3 py-2 font-['DM_Sans'] text-sm text-slate-700 transition hover:bg-slate-100"
        (click)="backToHome()"
      >
        Back
      </button>
    </div>

    <div class="mt-5 space-y-3">
      <p class="font-['DM_Sans'] text-sm font-semibold text-slate-700">Highlight style</p>

      <label class="flex items-center gap-2 rounded-lg border border-slate-200 p-3">
        <input
          type="radio"
          name="highlightMode"
          [checked]="highlightPreferenceService.mode() === 'color'"
          (change)="updateMode('color')"
        />
        <span class="font-['DM_Sans'] text-sm text-slate-700">Color background</span>
      </label>

      <label class="flex items-center gap-2 rounded-lg border border-slate-200 p-3">
        <input
          type="radio"
          name="highlightMode"
          [checked]="highlightPreferenceService.mode() === 'box'"
          (change)="updateMode('box')"
        />
        <span class="font-['DM_Sans'] text-sm text-slate-700">Outline box</span>
      </label>
    </div>

    <button
      type="button"
      class="mt-6 rounded-lg border border-rose-300 px-4 py-2 font-['DM_Sans'] text-sm font-semibold text-rose-700 transition hover:bg-rose-50"
      (click)="logout()"
    >
      Logout
    </button>
  </section>
</main>
