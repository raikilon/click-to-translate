<div class="space-y-2">
  @if (!editing()) {
    <div class="flex flex-wrap items-center justify-between gap-2">
      @if (hasValue()) {
        <p class="font-['DM_Sans'] text-sm text-slate-700">{{ value() }}</p>
      } @else {
        <p class="font-['DM_Sans'] text-sm text-slate-500">{{ emptyValueText() }}</p>
      }

      <button
        type="button"
        class="rounded-lg border border-slate-300 bg-white px-3 py-2 font-['DM_Sans'] text-xs font-semibold text-slate-700 transition hover:bg-slate-100"
        (click)="beginEdit()"
      >
        {{ editLabel() }}
      </button>
    </div>
  } @else {
    @if (effectiveEditorTemplate(); as editorTemplate) {
      <ng-container
        [ngTemplateOutlet]="editorTemplate"
        [ngTemplateOutletContext]="editorContext()"
      ></ng-container>
    } @else {
      <input
        type="text"
        [value]="draft()"
        [disabled]="saving()"
        class="w-full rounded-lg border border-slate-300 px-3 py-2 font-['DM_Sans'] text-sm text-slate-800"
        (input)="updateDraft($event)"
      />
    }

    <div class="flex flex-wrap gap-2">
      <button
        type="button"
        class="rounded-lg border border-cyan-300 px-3 py-2 font-['DM_Sans'] text-xs font-semibold text-cyan-700 transition hover:bg-cyan-50 disabled:cursor-not-allowed disabled:opacity-50"
        [disabled]="!canSave() || saving()"
        (click)="save()"
      >
        {{ saving() ? 'Saving...' : saveLabel() }}
      </button>

      <button
        type="button"
        class="rounded-lg border border-slate-300 bg-white px-3 py-2 font-['DM_Sans'] text-xs font-semibold text-slate-700 transition hover:bg-slate-100 disabled:cursor-not-allowed disabled:opacity-50"
        [disabled]="saving()"
        (click)="cancelEdit()"
      >
        {{ cancelLabel() }}
      </button>
    </div>

    @if (errorMessage()) {
      <p class="rounded-lg bg-rose-100 px-3 py-2 font-['DM_Sans'] text-sm text-rose-700">
        {{ errorMessage() }}
      </p>
    }
  }
</div>
