<div class="relative">
  <input
    type="text"
    [value]="query()"
    class="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 font-['DM_Sans'] text-sm text-slate-800 shadow-sm outline-none transition focus:border-cyan-500 focus:ring-2 focus:ring-cyan-100"
    placeholder="Search terms or type @DE, @EN..."
    (input)="onInput($event)"
    (focus)="onFocus()"
    (blur)="onBlur()"
  />

  @if (focused() && query().includes('@')) {
    <div class="absolute z-20 mt-2 w-full rounded-xl border border-slate-200 bg-white p-2 shadow-lg">
      @if (suggestionsLoading()) {
        <p class="px-2 py-1 font-['DM_Sans'] text-sm text-slate-500">Loading languages...</p>
      }

      @if (!suggestionsLoading() && languageSuggestions().length === 0) {
        <p class="px-2 py-1 font-['DM_Sans'] text-sm text-slate-500">No matching language.</p>
      }

      @for (language of languageSuggestions(); track language) {
        <button
          type="button"
          class="block w-full rounded-lg px-3 py-2 text-left font-['DM_Sans'] text-sm text-slate-700 transition hover:bg-cyan-50"
          (mousedown)="selectLanguage(language)"
        >
          {{ '@' + language }}
        </button>
      }
    </div>
  }
</div>
